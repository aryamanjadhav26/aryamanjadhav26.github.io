#########################################################################################################
# Build settings for the site. Editing the below may cause the site to malfunction.

collections:
  projects:
    output: true
    permalink: /projects/:path/


markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1
      indent: 0

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

include:
  - _projects

# SEO and Site Configuration
url: "https://aryamanj26.github.io"  # Update this to your actual GitHub Pages URL
baseurl: ""  # Leave empty for user pages
locale: "en_US"

# Additional SEO settings
google_analytics: # Add your Google Analytics ID here when you set it up
google_site_verification: # Add your Google Search Console verification code here

# Jekyll SEO Tag settings
social:
  name: Aryaman Jadhav
  links:
    - https://www.linkedin.com/in/aryamanjadhav
    - https://github.com/Aryamanj26

