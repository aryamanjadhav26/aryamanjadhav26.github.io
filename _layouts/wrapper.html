<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Meta Tags -->
    <title>{% if page.title %}{{ page.title | escape }} | {{ site.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>
    <meta name="description" content="{% if page.description %}{{ page.description | strip_html | strip_newlines | truncate: 160 | escape }}{% else %}{{ site.description | strip_html | strip_newlines | truncate: 160 | escape }}{% endif %}">
    <meta name="keywords" content="Aryaman Jadhav, aryaman jadhav, electrical engineer, mmWave radar, FMCW radar, embedded systems, FPGA design, CUDA, Python, hardware design, RTL, signal processing, sensor fusion, portfolio">
    <meta name="author" content="{{ site.name | escape }}">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="{{ page.url | absolute_url }}">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:title" content="{% if page.title %}{{ page.title | escape }} | {{ site.title | escape }}{% else %}{{ site.title | escape }}{% endif %}">
    <meta property="og:description" content="{% if page.description %}{{ page.description | strip_html | strip_newlines | truncate: 160 | escape }}{% else %}{{ site.description | strip_html | strip_newlines | truncate: 160 | escape }}{% endif %}">
    <meta property="og:site_name" content="{{ site.title | escape }}">
    {% if site.profile_image %}<meta property="og:image" content="{{ site.profile_image | absolute_url }}">{% endif %}

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="{{ page.url | absolute_url }}">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title | escape }} | {{ site.title | escape }}{% else %}{{ site.title | escape }}{% endif %}">
    <meta name="twitter:description" content="{% if page.description %}{{ page.description | strip_html | strip_newlines | truncate: 160 | escape }}{% else %}{{ site.description | strip_html | strip_newlines | truncate: 160 | escape }}{% endif %}">
    {% if site.profile_image %}<meta name="twitter:image" content="{{ site.profile_image | absolute_url }}">{% endif %}

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "{{ site.name | escape }}",
      "jobTitle": "{{ site.headline | escape }}",
      "description": "{{ site.description | strip_html | strip_newlines | escape }}",
      "url": "{{ site.url }}",
      {% if site.profile_image %}"image": "{{ site.profile_image | absolute_url }}",{% endif %}
      "sameAs": [
        {% assign first_social_link = true %}
        {% if site.external-links.linkedin %}
          "https://www.linkedin.com/in/{{ site.external-links.linkedin }}"
          {% assign first_social_link = false %}
        {% endif %}
        {% if site.external-links.github %}
          {% unless first_social_link %},{% endunless %}
          "https://github.com/{{ site.external-links.github }}"
          {% assign first_social_link = false %}
        {% endif %}
        {% if site.external-links.x-twitter %}
          {% unless first_social_link %},{% endunless %}
          "https://x.com/{{ site.external-links.x-twitter }}"
        {% endif %}
      ]
    }
    </script>

    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    

    <link rel="stylesheet" href="{{ '/css/styles.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/syntax.css' | relative_url }}">

    <script src="{{ '/assets/js/script.js' | relative_url }}" defer></script>

    <!-- Google Analytics 4 -->
    {% if site.google_analytics %}
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '{{ site.google_analytics }}');
    </script>
    {% endif %}

</head>
<body>
    <!-- NAVBAR -->
    {% include navbar.html %}

    <div class="page">{{ content }}</div>
    {% include footer.html %}
</body>
</html>
